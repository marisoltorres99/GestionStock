{% extends "base.html" %}

{% block contenido %}

<h1 class="mb-4">
    Dashboard
</h1>

<div class="row g-4">

    <div class="col-md-6 col-lg-3">

        <div class="card bg-primary text-white shadow-sm h-100">

            <div class="card-body">

                <h5 class="card-title">
                    <i class="bi bi-people-fill"></i>
                    Clientes
                </h5>

                <h2>
                    {{ total_clientes }}
                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-6 col-lg-3">

        <div class="card bg-success text-white shadow-sm h-100">

            <div class="card-body">

                <h5 class="card-title">
                    <i class="bi bi-box-seam"></i>
                    Productos
                </h5>

                <h2>
                    {{ total_productos }}
                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-6 col-lg-3">

        <div class="card bg-warning text-dark shadow-sm h-100">

            <div class="card-body">

                <h5 class="card-title">
                    <i class="bi bi-cart-fill"></i>
                    Ventas
                </h5>

                <h2>
                    {{ total_ventas }}
                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-6 col-lg-3">

        <div class="card bg-info text-dark shadow-sm h-100">

            <div class="card-body">

                <h5 class="card-title">
                    <i class="bi bi-graph-up-arrow"></i>
                    Ventas Hoy
                </h5>

                <h2>
                    {{ ventas_hoy }}
                </h2>

            </div>

        </div>

    </div>

    <div class="col-12">

        <div class="card bg-dark text-white shadow-sm">

            <div class="card-body">

                <h5 class="card-title">
                    <i class="bi bi-cash-stack"></i>
                    Recaudación del Mes
                </h5>

                <h2>
                    $ {{ recaudacion_mes }}
                </h2>

            </div>

        </div>

    </div>

</div>

{% endblock %}
