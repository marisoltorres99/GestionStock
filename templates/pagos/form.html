{% extends "base.html" %}

{% block contenido %}

<h1>Registrar Pago</h1>

<form method="POST">

    <label>Cliente:</label>
    <select name="cliente_id" required>
        <option value="">Seleccionar cliente</option>

        {% for c in clientes %}
            <option value="{{ c.id }}">
                {{ c.nombre }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <label>Monto:</label>
    <input type="number"
           name="monto"
           step="0.01"
           min="0"
           required>

    <br><br>

    <button type="submit">
        Guardar Pago
    </button>

</form>

<br>

<a href="/pagos">Ver pagos</a>

{% endblock %}
