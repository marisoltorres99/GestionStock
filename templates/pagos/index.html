{% extends "base.html" %}

{% block contenido %}

<h1>Pagos</h1>

<a class="btn btn-primary" href="/pagos/crear">Registrar pago</a>

<hr>

<table class="table table-striped table-hover">
    <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Monto</th>
        <th>Fecha</th>
    </tr>

    {% for p in pagos %}
    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.cliente.nombre }}</td>
        <td>{{ p.monto }}</td>
        <td>{{ p.fecha }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
