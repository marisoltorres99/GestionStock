<!DOCTYPE html>
<html>
<head>
    <title>Gestion de Stock</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

            <a class="navbar-brand" href="/">
                Gestion De Stock
            </a>

            <ul class="navbar-nav d-flex flex-row gap-3">

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('cliente.listar') }}">
                        Clientes
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('producto.listar') }}">
                        Productos
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('venta.listar') }}">
                        Ventas
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('pago.listar') }}">
                        Pagos
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('informe.listar') }}">
                        Informes
                    </a>
                </li>

            </ul>

        </div>

    </nav>

    <div class="container mt-4">
        {% block contenido %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
