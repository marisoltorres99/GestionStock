{% extends "base.html" %}

{% block contenido %}

<h1>Clientes</h1>

<a href="{{ url_for('cliente.crear') }}"
   class="btn btn-primary btn-responsive">

    Nuevo cliente

</a>

<hr>

<div class="table-responsive">

    <table class="table table-striped table-hover">

        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>

        {% for c in clientes %}

        <tr>

            <td>{{ c.id }}</td>

            <td>{{ c.nombre }}</td>

            <td>{{ c.telefono }}</td>

            <td>

                <div class="d-flex gap-2 flex-wrap">

                    <a href="/clientes/editar/{{ c.id }}"
                       class="btn btn-warning btn-responsive btn-acciones">

                        Editar

                    </a>

                    <!-- Botón abrir modal -->

                    <button type="button"
                            class="btn btn-danger btn-responsive btn-acciones"
                            data-bs-toggle="modal"
                            data-bs-target="#modalEliminar{{ c.id }}">

                        Eliminar

                    </button>

                    <a href="/clientes/{{ c.id }}"
                       class="btn btn-primary btn-responsive btn-acciones">

                        Ver detalle

                    </a>

                </div>

                <!-- Modal -->

                <div class="modal fade"
                     id="modalEliminar{{ c.id }}"
                     tabindex="-1"
                     aria-hidden="true">

                    <div class="modal-dialog">

                        <div class="modal-content">

                            <div class="modal-header">

                                <h5 class="modal-title">

                                    Confirmar eliminación

                                </h5>

                                <button type="button"
                                        class="btn-close"
                                        data-bs-dismiss="modal">
                                </button>

                            </div>

                            <div class="modal-body">

                                ¿Seguro que querés eliminar
                                al cliente <strong>{{ c.nombre }}</strong>?

                            </div>

                            <div class="modal-footer">

                                <button type="button"
                                        class="btn btn-secondary"
                                        data-bs-dismiss="modal">

                                    Cancelar

                                </button>

                                <form action="/clientes/eliminar/{{ c.id }}"
                                      method="POST">

                                    <button type="submit"
                                            class="btn btn-danger">

                                        Eliminar

                                    </button>

                                </form>

                            </div>

                        </div>

                    </div>

                </div>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

<a class="btn btn-secondary btn-responsive"
   href="/">

    Volver

</a>

{% endblock %}
