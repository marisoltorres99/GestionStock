{% extends "base.html" %}

{% block contenido %}

<h1>Clientes con Deuda</h1>

<hr>

<div class="table-responsive">
    <table class="table table-striped table-hover">

        <thead>
            <tr>
                <th>Cliente</th>
                <th>Monto Ventas Fiadas</th>
                <th>Monto Pagos</th>
                <th>Deuda</th>
            </tr>
        </thead>

        <tbody>

            {% for item in clientes_con_deudas %}

            <tr>

                <td>{{ item.cliente.nombre }}</td>

                <td>$ {{ item.ventas }}</td>

                <td>$ {{ item.pagos }}</td>

                <td>$ {{ item.deuda }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>
</div>

<div class="d-flex gap-2 flex-wrap">
    <a href="{{ url_for('informe.exportarClientesDeudasPDF') }}" class="btn btn-danger btn-responsive">Exportar PDF</a>

    <a href="{{ url_for('informe.exportarClientesDeudasExcel') }}" class="btn btn-success btn-responsive">Exportar Excel</a>

    <a href="{{ url_for('informe.listar') }}" class="btn btn-secondary btn-responsive">Volver</a>
</div>

{% endblock %}
