{% extends "base.html" %}

{% block contenido %}

<h1>Clientes con Deuda</h1>

<hr>

<div class="table-responsive">
    <table class="table table-striped table-hover">

        <thead>
            <tr>
                <th>Cliente</th>
                <th>Monto Ventas Fiadas</th>
                <th>Monto Pagos</th>
                <th>Deuda</th>
            </tr>
        </thead>

        <tbody>

            {% for item in clientes_con_deudas %}

            <tr>

                <td>{{ item.cliente.nombre }}</td>

                <td>$ {{ item.ventas }}</td>

                <td>$ {{ item.pagos }}</td>

                <td>$ {{ item.deuda }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>
</div>
<a href="{{ url_for('informe.listar') }}" class="btn btn-secondary">Volver</a>

{% endblock %}
