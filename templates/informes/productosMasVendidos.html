{% extends "base.html" %}

{% block contenido %}

<h1>Reporte Productos Mas Vendidos</h1>

<hr>

<div class="table-responsive">
    <table class="table table-striped table-hover">

        <thead>
            <tr>
                <th>#</th>
                <th>Producto</th>
                <th>Cantidad Vendida</th>
            </tr>
        </thead>

        <tbody>

            {% for detalle in detallesVentas %}

            <tr>

                <td>{{ loop.index }}</td>

                <td>{{ detalle.nombre }}</td>

                <td>{{ detalle.cantidadProductoVendido }} unidades</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>
</div>

<div class="d-flex gap-2 flex-wrap">
    <a href="{{ url_for('informe.exportarProductosMasVendidosPDF') }}" class="btn btn-danger btn-responsive">Exportar PDF</a>

    <a href="{{ url_for('informe.exportarProductosMasVendidosExcel') }}" class="btn btn-success btn-responsive">Exportar Excel</a>

    <a href="{{ url_for('informe.listar') }}" class="btn btn-secondary btn-responsive">Volver</a>
</div>

{% endblock %}
