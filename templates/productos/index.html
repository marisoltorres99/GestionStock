{% extends "base.html" %}

{% block contenido %}

<h1>Productos</h1>

<a class="btn btn-primary btn-responsive" href="/productos/crear">Nuevo producto</a>

<hr>

<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.nombre }}</td>
                <td>{{ p.precio }}</td>
                <td>{{ p.stock }}</td>
                <td>
                    <a class="btn btn-warning btn-responsive" href="/productos/editar/{{ p.id }}">Editar</a>
                    <form action="/productos/eliminar/{{ p.id }}" method="POST" style="display:inline;">
                        <button class="btn btn-danger btn-responsive" type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<a class="btn btn-secondary btn-responsive" href="/">Volver</a>

{% endblock %}
